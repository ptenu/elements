<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <title>PTU Elements</title>

  <link rel="stylesheet" href="/build/ptu-elements.css">

  <script type="module" src="/build/ptu-elements.esm.js"></script>
  <script nomodule src="/build/ptu-elements.js"></script>
</head>

<body>
  <div style="background-color: var(--white)">
    <ptu-section>
      <header full-width>
        <h1>Section title</h1>
        <p>Some explanation of what you need to do here.</p>
      </header>
      <article>
        The actual content
      </article>
      <footer full-width>
        <ptu-button text-colour="white" icon="check">Start Now</ptu-button>
        <ptu-button link>More information</ptu-button>
      </footer>
    </ptu-section>
  </div>
  <ptu-section>
    <h2>Some more info</h2>
    <p>
      Something else
    </p>
  </ptu-section>
</body>

</html>
